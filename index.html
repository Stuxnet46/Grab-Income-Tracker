<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Grab Tracker"/>
<meta name="theme-color" content="#0a1628"/>
<title>Grab Income Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100%;overflow:hidden;background:#0a1628;font-family:'DM Sans',sans-serif;color:#e8f4fd;}
body{max-width:480px;margin:0 auto;display:flex;flex-direction:column;}

/* THEME VARS */
body.light{background:#f0f7f0;color:#1a2e1a;}
body.light .hdr{background:rgba(240,247,240,0.97);border-color:rgba(0,168,74,0.15);}
body.light .card{background:rgba(255,255,255,0.85);border-color:rgba(0,168,74,0.12);}
body.light .card-g{background:rgba(0,168,74,0.08);border-color:rgba(0,168,74,0.2);}
body.light .card-y{background:rgba(212,160,0,0.08);border-color:rgba(212,160,0,0.22);}
body.light .card-p{background:rgba(100,50,200,0.06);border-color:rgba(100,50,200,0.2);}
body.light .card-r{background:rgba(255,60,60,0.06);border-color:rgba(255,60,60,0.18);}
body.light .muted{color:#5a7a5a;}
body.light .sess-item{background:rgba(255,255,255,0.8);}
body.light .day-item{background:rgba(255,255,255,0.8);}
body.light .modal-box{background:linear-gradient(180deg,#fff,#e8f5e9);}
body.light .inp{background:rgba(255,255,255,0.9);}
body.light .tab-in{background:rgba(0,168,74,0.06);color:#5a7a5a;}
body.light .pin-wrap{background:#f0f7f0;}
body.light .pkey{background:rgba(255,255,255,0.9);border-color:rgba(0,168,74,0.15);color:#1a2e1a;}
body.light .footer{background:rgba(240,247,240,0.97);border-color:rgba(0,168,74,0.15);}

/* TICKER */
.ticker{width:100%;height:26px;background:#00c864;overflow:hidden;display:flex;align-items:center;flex-shrink:0;position:relative;z-index:10;}
.ticker-t{white-space:nowrap;animation:tick 22s linear infinite;font-size:10px;font-weight:700;color:#071a2e;letter-spacing:2.5px;font-family:'Syne',sans-serif;padding-left:100%;}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* PIN SCREEN */
#pin-screen{position:fixed;inset:0;z-index:9000;background:#0a1628;display:flex;flex-direction:column;align-items:center;overflow-y:auto;}
body.light #pin-screen{background:#f0f7f0;}
.pin-wrap{width:100%;max-width:380px;padding:24px 22px 50px;display:flex;flex-direction:column;align-items:center;}
.pin-logo{width:66px;height:66px;border-radius:18px;background:linear-gradient(135deg,#00c864,#00a855);display:flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 8px 28px rgba(0,200,100,0.35);}
.pin-logo span{font-size:22px;font-weight:900;color:#fff;font-family:'Syne',sans-serif;}
.pin-badge{border:1px solid #00c864;border-radius:20px;padding:3px 14px;font-size:10px;color:#00c864;letter-spacing:2px;text-transform:uppercase;font-family:'Syne',sans-serif;margin-bottom:10px;}
.pin-title{font-size:24px;font-weight:900;font-family:'Syne',sans-serif;margin-bottom:6px;text-align:center;}
.pin-sub{font-size:13px;color:#4a7a9b;text-align:center;margin-bottom:16px;line-height:1.5;}
.pin-sub b{color:#00c864;}
body.light .pin-sub{color:#5a7a5a;}
.pin-tabs{display:flex;width:100%;max-width:270px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);margin-bottom:22px;}
body.light .pin-tabs{border-color:rgba(0,168,74,0.15);}
.ptab{flex:1;padding:10px 0;font-size:12px;font-weight:700;text-align:center;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;user-select:none;}
.ptab.on{background:#00c864;color:#fff;}
.ptab.off{background:transparent;color:#4a7a9b;}
.pin-dots{display:flex;gap:13px;margin-bottom:20px;}
.dot{width:13px;height:13px;border-radius:50%;border:2px solid #00c864;background:transparent;transition:background 0.15s;}
.dot.filled{background:#00c864;}
.pin-err{font-size:12px;color:#ff4444;min-height:18px;margin-bottom:12px;font-weight:600;text-align:center;}
.pkey-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px;}
.pkey{padding:17px 0;border-radius:13px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.05);font-size:22px;font-weight:700;color:#e8f4fd;cursor:pointer;font-family:'Syne',sans-serif;text-align:center;user-select:none;transition:background 0.1s,transform 0.1s;}
.pkey:active,.pkey.pressed{background:#00c864!important;color:#071a2e!important;transform:scale(0.93);}
.pkey.ghost{background:transparent!important;border-color:transparent!important;pointer-events:none;}
.pkey.del{font-size:14px;color:#4a7a9b;}
.pin-actions{display:flex;gap:8px;margin-top:20px;width:100%;max-width:280px;}
.pin-act-btn{flex:1;padding:11px 0;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;user-select:none;border:none;}
.btn-export-pin{background:rgba(0,200,100,0.1);border:1px solid rgba(0,200,100,0.3)!important;color:#00c864;}
.btn-import-pin{background:rgba(0,150,255,0.1);border:1px solid rgba(0,150,255,0.3)!important;color:#5b8dd9;}
.pin-note{font-size:10px;color:#4a7a9b;margin-top:10px;text-align:center;line-height:1.6;}
.pin-note b{color:#00c864;}
.pin-copy{font-size:10px;color:#2a4a6a;margin-top:14px;text-align:center;}
body.light .pin-copy{color:#8aaa8a;}

/* APP */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden;}
.hdr{background:rgba(10,22,40,0.97);border-bottom:1px solid rgba(0,200,100,0.15);padding:11px 15px 0;flex-shrink:0;backdrop-filter:blur(16px);position:relative;z-index:10;}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.brand-lbl{font-size:10px;color:#00c864;letter-spacing:3px;text-transform:uppercase;font-weight:700;font-family:'Syne',sans-serif;}
.brand-title{font-size:18px;font-weight:900;font-family:'Syne',sans-serif;letter-spacing:-0.3px;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.clock-d{font-size:10px;color:#4a7a9b;}
.clock-t{font-size:18px;font-weight:700;color:#00c864;font-variant-numeric:tabular-nums;letter-spacing:1px;}
.hdr-btns{display:flex;gap:5px;}
.hdr-btn{border-radius:8px;padding:4px 9px;font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.5px;border:none;transition:all 0.2s;user-select:none;}
.btn-theme{background:rgba(255,255,255,0.07);color:#4a7a9b;border:1px solid rgba(255,255,255,0.08)!important;}
.btn-logout{background:rgba(255,60,60,0.1);color:#ff6060;border:1px solid rgba(255,60,60,0.25)!important;}
.tabs{display:flex;gap:4px;padding-bottom:10px;}
.tab{flex:1;padding:8px 0;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:12px;transition:all 0.2s;font-family:'DM Sans',sans-serif;user-select:none;}
.tab-on{background:#00c864;color:#fff;}
.tab-in{background:rgba(255,255,255,0.05);color:#4a7a9b;border:1px solid rgba(255,255,255,0.07)!important;}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:15px 14px 72px;position:relative;z-index:1;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:rgba(0,200,100,0.3);border-radius:2px;}

/* CARDS */
.card{border-radius:14px;padding:14px 15px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.04);}
.card-g{background:rgba(0,200,100,0.08);border-color:rgba(0,200,100,0.2)!important;}
.card-y{background:rgba(255,200,0,0.07);border-color:rgba(255,200,0,0.2)!important;}
.card-p{background:rgba(130,80,255,0.08);border-color:rgba(130,80,255,0.2)!important;}
.card-r{background:rgba(255,60,60,0.07);border-color:rgba(255,60,60,0.2)!important;}
.card-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:6px;font-family:'Syne',sans-serif;}
.lbl-g{color:#00c864;}.lbl-y{color:#ffc800;}.lbl-p{color:#a67fff;}.lbl-r{color:#ff6060;}.lbl-m{color:#4a7a9b;}
body.light .lbl-p{color:#6432c8;}
.big-n{font-size:28px;font-weight:900;font-family:'Syne',sans-serif;font-variant-numeric:tabular-nums;}
.n-g{color:#00e87a;}.n-y{color:#ffd700;}.n-p{color:#c4a0ff;}
body.light .n-p{color:#6432c8;}

/* PROGRESS */
.prog{margin-top:9px;}
.prog-meta{display:flex;justify-content:space-between;font-size:11px;color:#4a7a9b;margin-bottom:4px;}
.prog-track{height:7px;border-radius:4px;background:rgba(128,128,128,0.15);overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;transition:width 0.5s;}
.fill-g{background:#00c864;}.fill-y{background:linear-gradient(90deg,#ffc800,#ff9500);}.fill-p{background:linear-gradient(90deg,#8250ff,#a67fff);}
.prog-note{font-size:11px;color:#4a7a9b;margin-top:4px;}
.prog-ok{color:#00c864;font-weight:700;}

/* ON/OFF */
.onoff-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:18px;gap:10px;}
.onoff-btn{width:122px;height:122px;border-radius:50%;border:none;cursor:pointer;font-weight:900;text-transform:uppercase;font-family:'Syne',sans-serif;transition:all 0.3s;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;user-select:none;}
.btn-on{background:linear-gradient(145deg,#00d96e,#00a855);color:#071a2e;box-shadow:0 0 50px rgba(0,200,100,0.4),inset 0 1px 0 rgba(255,255,255,0.2);}
.btn-off{background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.08)!important;color:#4a7a9b;}
.btn-on::before{content:'';position:absolute;inset:-13px;border-radius:50%;background:radial-gradient(circle,rgba(0,200,100,0.2) 0%,transparent 70%);animation:glow 2s infinite;}
@keyframes glow{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.12);opacity:1}}
.on-icon{font-size:26px;line-height:1;}
.on-lbl{font-size:13px;}
.since{text-align:center;}
.since-lbl{font-size:10px;color:#00c864;letter-spacing:2px;text-transform:uppercase;}
.since-t{font-size:16px;font-weight:700;color:#00c864;}
.timer{font-size:34px;font-weight:900;letter-spacing:3px;font-variant-numeric:tabular-nums;font-family:'Syne',sans-serif;}

/* SESSIONS */
.sess-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:10px 13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.sess-live{background:rgba(0,200,100,0.08);border-color:rgba(0,200,100,0.3)!important;}
.sess-t{font-size:13px;font-weight:700;}
.sess-n{font-size:11px;color:#4a7a9b;margin-top:2px;}
.sess-d{font-size:14px;font-weight:800;color:#00c864;font-variant-numeric:tabular-nums;}

/* RATE GRID */
.rate-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.rate-card{background:rgba(0,100,255,0.08);border:1px solid rgba(0,100,255,0.2);border-radius:12px;padding:11px 6px;text-align:center;}
body.light .rate-card{background:rgba(0,100,200,0.06);}
.rate-lbl{font-size:10px;color:#5b8dd9;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.rate-val{font-weight:800;color:#7ab4ff;font-variant-numeric:tabular-nums;line-height:1.2;}

/* INCOME INPUT */
.inp-wrap{display:flex;gap:7px;margin-top:9px;}
.inp{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,200,0,0.35);border-radius:10px;padding:10px 12px;color:#ffd700;font-size:16px;font-weight:700;outline:none;font-family:'DM Sans',sans-serif;}
.inp::placeholder{color:rgba(255,200,0,0.25);}
body.light .inp{color:#a07000;}
.btn{border:none;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;user-select:none;transition:opacity 0.15s;}
.btn:active{opacity:0.7;}
.btn-y{background:#ffc800;color:#071a2e;}
.btn-gh{background:rgba(255,255,255,0.08);color:#4a7a9b;border:1px solid rgba(255,255,255,0.1);}
.btn-gy-sm{background:rgba(255,200,0,0.1);border:1px solid rgba(255,200,0,0.3);color:#ffc800;border-radius:8px;padding:6px 12px;font-size:11px;margin-top:8px;cursor:pointer;font-weight:700;font-family:'DM Sans',sans-serif;user-select:none;}
.btn-primary{background:linear-gradient(135deg,#ffc800,#ff9500);color:#071a2e;border-radius:12px;padding:11px 18px;font-size:14px;}

/* BBM */
.bbm-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;}
.bbm-div{height:1px;background:rgba(255,255,255,0.08);margin:7px 0;}
body.light .bbm-div{background:rgba(0,0,0,0.08);}

/* NOTES */
.notes-inp{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 12px;color:#e8f4fd;font-size:13px;outline:none;font-family:'DM Sans',sans-serif;resize:none;margin-top:7px;}
body.light .notes-inp{background:rgba(255,255,255,0.8);color:#1a2e1a;}
.notes-inp::placeholder{color:#4a7a9b;opacity:0.6;}

/* LIBUR */
.libur-btn{width:100%;padding:9px;border-radius:10px;border:1px dashed rgba(255,60,60,0.4);background:transparent;color:#ff6060;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;user-select:none;}
.libur-on{background:rgba(255,60,60,0.1)!important;border-style:solid!important;}

/* DAY ITEMS */
.day-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:11px 13px;margin-bottom:8px;}
.day-today{background:rgba(0,200,100,0.08)!important;border-color:rgba(0,200,100,0.25)!important;}
.day-libur{background:rgba(255,60,60,0.05)!important;border-color:rgba(255,60,60,0.18)!important;}
.day-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.day-name{font-size:13px;font-weight:700;}
.day-today .day-name{color:#00e87a;}
.day-badge{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:4px;margin-left:5px;}
.badge-today{color:#00c864;background:rgba(0,200,100,0.15);}
.badge-libur{color:#ff6060;background:rgba(255,60,60,0.12);}
.day-bar{height:4px;border-radius:2px;background:rgba(128,128,128,0.12);overflow:hidden;}
.day-bar-fill{height:100%;border-radius:2px;transition:width 0.4s;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:13px;}
body.light .stat-card{background:rgba(255,255,255,0.8);}
.stat-lbl{font-size:10px;color:#4a7a9b;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.stat-val{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;}
.sec-title{font-size:10px;color:#4a7a9b;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:9px;font-family:'Syne',sans-serif;}

/* INCOME TIPS BREAKDOWN */
.inc-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-size:12px;}
.inc-total{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-top:1px solid rgba(255,255,255,0.08);margin-top:4px;}
body.light .inc-total{border-color:rgba(0,0,0,0.08);}

/* FLOATING BTN */
.fab{position:fixed;bottom:50px;right:15px;z-index:60;width:56px;height:56px;border-radius:17px;border:none;cursor:pointer;background:linear-gradient(145deg,#0d2137,#071a2e);box-shadow:0 0 0 1px rgba(0,200,100,0.4),0 8px 30px rgba(0,200,100,0.2);display:flex;align-items:center;justify-content:center;overflow:hidden;user-select:none;}
.fab::before{content:'';position:absolute;inset:0;border-radius:17px;background:linear-gradient(145deg,rgba(0,200,100,0.12),transparent 60%);pointer-events:none;}
.fab:active{transform:scale(0.88);}
body.light .fab{background:linear-gradient(145deg,#e0f0e0,#f0f7f0);}

/* MODAL */
.modal-ov{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-ov.show{opacity:1;pointer-events:all;}
.modal-box{background:linear-gradient(180deg,#0d2137,#071a2e);border:1px solid rgba(0,200,100,0.15);border-radius:22px 22px 0 0;padding:22px 18px 44px;width:100%;max-width:480px;transform:translateY(100%);transition:transform 0.3s ease;}
body.light .modal-box{background:linear-gradient(180deg,#fff,#e8f5e9);}
.modal-ov.show .modal-box{transform:translateY(0);}
.modal-title{font-size:16px;font-weight:800;margin-bottom:4px;font-family:'Syne',sans-serif;}
.modal-sub{font-size:12px;color:#4a7a9b;margin-bottom:14px;}
.modal-ta{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(0,200,100,0.25);border-radius:12px;padding:12px 13px;color:#e8f4fd;font-size:14px;resize:none;outline:none;margin-bottom:13px;font-family:'DM Sans',sans-serif;line-height:1.5;}
body.light .modal-ta{background:rgba(255,255,255,0.8);color:#1a2e1a;}
.modal-ta::placeholder{color:#4a7a9b;opacity:0.5;}
.modal-btns{display:flex;gap:10px;}
.btn-cancel{flex:1;padding:13px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#4a7a9b;font-weight:700;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;user-select:none;}
.btn-off{flex:2;padding:13px;background:linear-gradient(135deg,#ff4444,#cc1111);border:none;border-radius:12px;color:#fff;font-weight:800;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;user-select:none;}

/* CALC */
.calc-inp{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(0,200,100,0.3);border-radius:10px;padding:11px 13px;color:#e8f4fd;font-size:16px;font-weight:700;outline:none;font-family:'DM Sans',sans-serif;margin-top:6px;}
body.light .calc-inp{background:rgba(255,255,255,0.8);color:#1a2e1a;}
.calc-inp::placeholder{color:#4a7a9b;opacity:0.5;}
.calc-result{background:rgba(0,200,100,0.08);border:1px solid rgba(0,200,100,0.2);border-radius:12px;padding:13px 15px;margin:13px 0;display:flex;justify-content:space-between;align-items:center;}
.calc-r-val{font-size:22px;font-weight:900;color:#00c864;font-family:'Syne',sans-serif;font-variant-numeric:tabular-nums;}
.calc-r-val.zero{color:#4a7a9b;font-size:18px;}
.btn-tips{width:100%;padding:13px;background:linear-gradient(135deg,#00c864,#00a855);border:none;border-radius:12px;color:#fff;font-weight:800;cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;margin-bottom:8px;user-select:none;}
.btn-tips:disabled{opacity:0.3;cursor:not-allowed;}
.btn-reset{width:100%;padding:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#4a7a9b;font-weight:700;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;user-select:none;}

/* TOAST */
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%);background:#00c864;color:#071a2e;border-radius:20px;padding:9px 18px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap;font-family:'DM Sans',sans-serif;box-shadow:0 4px 20px rgba(0,200,100,0.4);animation:toastIn 0.3s ease;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* FOOTER */
.footer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:50;background:rgba(10,22,40,0.95);border-top:1px solid rgba(0,200,100,0.1);text-align:center;padding:7px 16px;font-size:10px;color:#2a4a6a;letter-spacing:1px;font-family:'Syne',sans-serif;}
.empty{text-align:center;color:#2a4a6a;font-size:13px;padding:28px 0;}

/* PAST INCOME */
.past-inp-wrap{margin-top:9px;}
.past-inp{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,200,0,0.3);border-radius:10px;padding:10px 12px;color:#ffd700;font-size:15px;font-weight:700;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:7px;}
body.light .past-inp{background:rgba(255,255,255,0.8);color:#a07000;}
.past-inp::placeholder{color:rgba(255,200,0,0.25);}
.past-btns{display:flex;gap:7px;}
