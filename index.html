<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Grab Tracker"/>
<meta name="theme-color" content="#0a1628"/>
<title>Grab Income Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --green: #00c864;
  --green-bright: #00f07a;
  --green-dark: #00a855;
  --gold: #ffc800;
  --blue: #0a1628;
  --blue-mid: #0d2137;
  --blue-light: #1a3a5c;
  --text: #e8f4fd;
  --muted: #4a7a9b;
  --border: rgba(255,255,255,0.08);
  --card-bg: rgba(255,255,255,0.04);
  --header-bg: rgba(10,22,40,0.95);
  --page-bg: #0a1628;
  --input-bg: rgba(255,255,255,0.07);
  --modal-bg: linear-gradient(180deg,#0d2137 0%,#071a2e 100%);
  --session-bg: rgba(255,255,255,0.04);
  --day-bg: rgba(255,255,255,0.04);
  --stat-bg: rgba(255,255,255,0.04);
  --rate-bg: rgba(0,100,255,0.08);
  --rate-border: rgba(0,100,255,0.2);
  --rate-label: #5b8dd9;
  --rate-val: #7ab4ff;
  --ticker-bg: #00c864;
  --ticker-text: #071a2e;
}
.light {
  --green: #00a84a;
  --green-bright: #007a35;
  --green-dark: #006b2c;
  --gold: #d4a000;
  --blue: #f0f7f0;
  --blue-mid: #e8f5e9;
  --blue-light: #c8e6c9;
  --text: #1a2e1a;
  --muted: #5a7a5a;
  --border: rgba(0,100,50,0.15);
  --card-bg: rgba(255,255,255,0.85);
  --header-bg: rgba(240,247,240,0.97);
  --page-bg: #f0f7f0;
  --input-bg: rgba(255,255,255,0.9);
  --modal-bg: linear-gradient(180deg,#ffffff 0%,#e8f5e9 100%);
  --session-bg: rgba(255,255,255,0.8);
  --day-bg: rgba(255,255,255,0.8);
  --stat-bg: rgba(255,255,255,0.8);
  --rate-bg: rgba(0,168,74,0.08);
  --rate-border: rgba(0,168,74,0.25);
  --rate-label: #007a35;
  --rate-val: #005a28;
  --ticker-bg: #00a84a;
  --ticker-text: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  background: var(--page-bg);
  display: flex; flex-direction: column;
  max-width: 480px; margin: 0 auto;
  transition: background 0.3s, color 0.3s;
}

/* BG glow dark only */
.bg-glow {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at 15% 10%, rgba(0,200,100,0.07) 0%, transparent 55%),
              radial-gradient(ellipse at 85% 85%, rgba(0,120,255,0.05) 0%, transparent 55%),
              linear-gradient(160deg, #0a1628 0%, #0d2137 50%, #071a2e 100%);
  opacity: 1; transition: opacity 0.3s;
}
.light .bg-glow { opacity: 0; }

/* ===== PIN SCREEN ===== */
#pinScreen {
  position: fixed; inset: 0; z-index: 200;
  background: var(--page-bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  overflow-y: auto;
  transition: background 0.3s;
}
.pin-ticker {
  width: 100%; background: var(--ticker-bg);
  overflow: hidden; height: 28px; display: flex; align-items: center; flex-shrink: 0;
}
.pin-ticker-inner {
  white-space: nowrap; animation: ticker 18s linear infinite;
  font-size: 11px; font-weight: 700; color: var(--ticker-text);
  letter-spacing: 2px; font-family: 'Syne', sans-serif;
}
.pin-wrap {
  width: 100%; max-width: 420px; padding: 30px 24px 40px;
  display: flex; flex-direction: column; align-items: center;
}
.pin-logo {
  width: 72px; height: 72px; border-radius: 18px;
  background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
  box-shadow: 0 8px 30px rgba(0,200,100,0.3);
}
.pin-logo-text { font-size: 22px; font-weight: 900; color: #fff; font-family: 'Syne', sans-serif; }
.pin-badge {
  border: 1px solid var(--green); border-radius: 20px;
  padding: 4px 14px; font-size: 10px; color: var(--green);
  letter-spacing: 2px; text-transform: uppercase; font-family: 'Syne', sans-serif;
  margin-bottom: 10px;
}
.pin-title { font-size: 26px; font-weight: 900; font-family: 'Syne', sans-serif; text-align: center; margin-bottom: 6px; }
.pin-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 6px; }
.pin-sub span { color: var(--green); font-weight: 700; }
.pin-mode-tabs { display: flex; gap: 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 24px; }
.pin-mode-tab {
  flex: 1; padding: 9px 0; font-size: 13px; font-weight: 700;
  border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}
.pin-mode-tab.active { background: var(--green); color: #fff; }
.pin-mode-tab.inactive { background: transparent; color: var(--muted); }
.pin-dots { display: flex; gap: 14px; margin-bottom: 28px; }
.pin-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--green); background: transparent;
  transition: background 0.15s;
}
.pin-dot.filled { background: var(--green); }
.pin-error { font-size: 12px; color: #ff4444; margin-bottom: 10px; min-height: 18px; font-weight: 600; }
.pin-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; max-width: 300px; }
.pin-key {
  padding: 18px 0; border-radius: 14px; border: 1px solid var(--border);
  background: var(--card-bg); font-size: 22px; font-weight: 700;
  color: var(--text); cursor: pointer; font-family: 'Syne', sans-serif;
  transition: all 0.15s; text-align: center;
}
.pin-key:active { background: var(--green); color: #fff; transform: scale(0.95); }
.pin-key.del { font-size: 14px; font-weight: 700; color: var(--muted); }
.pin-key.empty { background: transparent; border-color: transparent; pointer-events: none; }
.pin-footer-note { font-size: 11px; color: var(--muted); margin-top: 20px; text-align: center; }

/* ===== TICKER ===== */
.ticker-wrap {
  position: sticky; top: 0; z-index: 100;
  background: var(--ticker-bg);
  overflow: hidden; height: 26px; display: flex; align-items: center;
  flex-shrink: 0;
}
.ticker-inner {
  white-space: nowrap; animation: ticker 20s linear infinite;
  font-size: 10px; font-weight: 700; color: var(--ticker-text);
  letter-spacing: 2.5px; font-family: 'Syne', sans-serif; padding-left: 100%;
}
@keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

/* ===== APP ===== */
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; z-index: 1; }

/* Header */
.header {
  position: relative; z-index: 10;
  background: var(--header-bg);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 0;
  flex-shrink: 0;
  transition: background 0.3s;
}
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.header-brand {}
.brand-label { font-size: 10px; color: var(--green); letter-spacing: 3px; text-transform: uppercase; font-weight: 700; font-family: 'Syne', sans-serif; }
.brand-title { font-size: 19px; font-weight: 800; letter-spacing: -0.5px; font-family: 'Syne', sans-serif; }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.header-clock { text-align: right; }
.clock-date { font-size: 10px; color: var(--muted); }
.clock-time { font-size: 18px; font-weight: 700; color: var(--green); font-variant-numeric: tabular-nums; letter-spacing: 1px; }
.theme-btn {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 10px; font-size: 10px;
  font-weight: 700; color: var(--muted); cursor: pointer;
  font-family: 'DM Sans', sans-serif; letter-spacing: 1px; text-transform: uppercase;
  transition: all 0.2s;
}
.theme-btn:active { background: var(--green); color: #fff; }
.tabs { display: flex; gap: 4px; padding-bottom: 10px; }
.tab {
  flex: 1; padding: 8px 0; border-radius: 8px; border: none; cursor: pointer;
  font-weight: 700; font-size: 12px; letter-spacing: 0.3px;
  transition: all 0.2s; font-family: 'DM Sans', sans-serif;
}
.tab.active { background: var(--green); color: #fff; }
.tab.inactive { background: var(--card-bg); color: var(--muted); border: 1px solid var(--border); }

/* Content */
.content { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; z-index: 1; padding: 16px 14px 80px; }
.content::-webkit-scrollbar { width: 3px; }
.content::-webkit-scrollbar-thumb { background: rgba(0,200,100,0.3); border-radius: 2px; }

/* Cards */
.card { border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; border: 1px solid var(--border); background: var(--card-bg); transition: background 0.3s; }
.card-green { background: rgba(0,200,100,0.08); border-color: rgba(0,200,100,0.2); }
.card-gold { background: rgba(255,200,0,0.07); border-color: rgba(255,200,0,0.22); }
.card-purple { background: rgba(130,80,255,0.08); border-color: rgba(130,80,255,0.2); }
.card-red { background: rgba(255,60,60,0.07); border-color: rgba(255,60,60,0.2); }
.light .card-green { background: rgba(0,168,74,0.08); }
.light .card-gold { background: rgba(212,160,0,0.08); }
.light .card-purple { background: rgba(100,50,200,0.06); }
.card-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; font-family: 'Syne', sans-serif; }
.label-green { color: var(--green); }
.label-gold { color: var(--gold); }
.label-purple { color: #a67fff; }
.label-muted { color: var(--muted); }
.label-red { color: #ff6060; }
.light .label-purple { color: #6432c8; }
.big-num { font-size: 30px; font-weight: 800; font-family: 'Syne', sans-serif; font-variant-numeric: tabular-nums; }
.num-green { color: var(--green); }
.num-gold { color: var(--gold); }
.num-purple { color: #c4a0ff; }
.light .num-purple { color: #6432c8; }

/* Progress */
.progress-wrap { margin-top: 10px; }
.progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.progress-pct { font-weight: 700; }
.progress-track { height: 7px; border-radius: 4px; background: rgba(128,128,128,0.15); overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.fill-green { background: var(--green); }
.fill-gold { background: linear-gradient(90deg,#ffc800,#ff9500); }
.fill-purple { background: linear-gradient(90deg,#8250ff,#a67fff); }
.progress-note { font-size: 11px; color: var(--muted); margin-top: 5px; }
.progress-note.success { color: var(--green); font-weight: 700; }

/* ON/OFF */
.onoff-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 18px; gap: 10px; }
.onoff-btn {
  width: 124px; height: 124px; border-radius: 50%; border: none; cursor: pointer;
  font-weight: 900; text-transform: uppercase; font-family: 'Syne', sans-serif;
  transition: all 0.3s; position: relative;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
}
.onoff-btn.on {
  background: linear-gradient(145deg,#00d96e,#00a855);
  color: #071a2e;
  box-shadow: 0 0 50px rgba(0,200,100,0.4), 0 4px 20px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.25);
}
.onoff-btn.off {
  background: var(--card-bg);
  border: 2px solid var(--border);
  color: var(--muted);
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.onoff-btn.on::before {
  content:''; position:absolute; inset:-14px; border-radius:50%;
  background: radial-gradient(circle,rgba(0,200,100,0.2) 0%,transparent 70%);
  animation: glow-pulse 2s infinite;
}
.onoff-icon { font-size: 26px; line-height: 1; }
.onoff-label { font-size: 13px; }
.onoff-since { text-align: center; }
.since-label { font-size: 10px; color: var(--green); letter-spacing: 2px; text-transform: uppercase; }
.since-time { font-size: 16px; font-weight: 700; color: var(--green); }
.timer-display { font-size: 36px; font-weight: 900; letter-spacing: 3px; font-variant-numeric: tabular-nums; font-family: 'Syne', sans-serif; }

/* Sessions */
.session-list { display: flex; flex-direction: column; gap: 8px; }
.session-item { background: var(--session-bg); border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; display: flex; justify-content: space-between; align-items: center; transition: background 0.3s; }
.session-item.live { background: rgba(0,200,100,0.08); border-color: rgba(0,200,100,0.3); }
.session-time { font-size: 13px; font-weight: 700; }
.session-time.live { color: var(--green); }
.session-note { font-size: 11px; color: var(--muted); margin-top: 2px; }
.session-note.live { color: var(--green); }
.session-dur { font-size: 14px; font-weight: 800; color: var(--green); font-variant-numeric: tabular-nums; }

/* Rate grid */
.rate-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.rate-card { background: var(--rate-bg); border: 1px solid var(--rate-border); border-radius: 12px; padding: 11px 7px; text-align: center; }
.rate-label { font-size: 10px; color: var(--rate-label); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
.rate-val { font-weight: 800; color: var(--rate-val); font-variant-numeric: tabular-nums; line-height: 1.2; }

/* Income input */
.income-input-wrap { display: flex; gap: 8px; margin-top: 10px; }
.income-input {
  flex:1; background: var(--input-bg); border: 1px solid rgba(255,200,0,0.35);
  border-radius: 10px; padding: 10px 13px; color: var(--gold); font-size: 16px;
  font-weight: 700; outline: none; font-family: 'DM Sans', sans-serif;
}
.light .income-input { color: #a07000; border-color: rgba(212,160,0,0.5); }
.income-input::placeholder { color: rgba(255,200,0,0.25); }
.btn { border: none; border-radius: 10px; padding: 10px 15px; font-weight: 800; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; transition: opacity 0.15s; }
.btn:active { opacity: 0.75; }
.btn-gold { background: var(--gold); color: #071a2e; }
.btn-ghost { background: var(--card-bg); color: var(--muted); border: 1px solid var(--border); }
.btn-green { background: var(--green); color: #fff; }
.btn-outline-gold { background: rgba(255,200,0,0.1); border: 1px solid rgba(255,200,0,0.3); color: var(--gold); border-radius: 8px; padding: 6px 14px; font-size: 12px; margin-top: 10px; cursor: pointer; font-weight: 700; font-family: 'DM Sans', sans-serif; }
.btn-primary { background: linear-gradient(135deg,#ffc800,#ff9500); color: #071a2e; border-radius: 12px; padding: 11px 20px; font-size: 14px; }

/* BBM card */
.bbm-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
.bbm-label { font-size: 12px; color: var(--muted); }
.bbm-val { font-size: 13px; font-weight: 700; }
.bbm-divider { height: 1px; background: var(--border); margin: 8px 0; }

/* Notes */
.notes-input {
  width: 100%; background: var(--input-bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 13px; color: var(--text); font-size: 13px;
  outline: none; font-family: 'DM Sans', sans-serif; resize: none; margin-top: 8px;
}
.notes-input::placeholder { color: var(--muted); }

/* Day items */
.day-item { background: var(--day-bg); border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; margin-bottom: 8px; transition: background 0.3s; }
.day-item.today { background: rgba(0,200,100,0.09); border-color: rgba(0,200,100,0.28); }
.day-item.libur { background: rgba(255,60,60,0.06); border-color: rgba(255,60,60,0.2); }
.day-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.day-name { font-size: 13px; font-weight: 700; }
.day-name.today { color: var(--green); }
.day-badge { font-size: 9px; color: var(--green); font-weight: 700; letter-spacing: 1px; background: rgba(0,200,100,0.15); padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
.day-badge.libur-badge { color: #ff6060; background: rgba(255,60,60,0.12); }
.day-income { font-size: 15px; font-weight: 800; }
.day-bar { height: 4px; border-radius: 2px; background: rgba(128,128,128,0.15); overflow: hidden; }
.day-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card { background: var(--stat-bg); border: 1px solid var(--border); border-radius: 12px; padding: 13px; transition: background 0.3s; }
.stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.stat-val { font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; }

/* Section title */
.section-title { font-size: 10px; color: var(--muted); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 10px; font-family: 'Syne', sans-serif; }

/* Libur toggle */
.libur-btn {
  width: 100%; padding: 10px; border-radius: 10px; border: 1px dashed rgba(255,60,60,0.4);
  background: transparent; color: #ff6060; font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 4px; transition: all 0.2s;
}
.libur-btn.active { background: rgba(255,60,60,0.12); border-style: solid; }
.libur-btn:active { opacity: 0.7; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal-box {
  background: var(--modal-bg); border: 1px solid var(--border);
  border-radius: 22px 22px 0 0; padding: 22px 18px 40px;
  width: 100%; max-width: 480px;
  transform: translateY(100%); transition: transform 0.3s ease;
}
.modal-overlay.show .modal-box { transform: translateY(0); }
.modal-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; font-family: 'Syne', sans-serif; }
.modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.modal-textarea {
  width: 100%; background: var(--input-bg); border: 1px solid rgba(0,200,100,0.25);
  border-radius: 12px; padding: 12px 13px; color: var(--text); font-size: 14px;
  resize: none; outline: none; margin-bottom: 13px; font-family: 'DM Sans', sans-serif; line-height: 1.5;
}
.modal-textarea::placeholder { color: var(--muted); opacity: 0.6; }
.modal-btns { display: flex; gap: 10px; }
.btn-cancel { flex:1; padding:13px; background:var(--card-bg); border:1px solid var(--border); border-radius:12px; color:var(--muted); font-weight:700; cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif; }
.btn-off { flex:2; padding:13px; background:linear-gradient(135deg,#ff4444,#cc1111); border:none; border-radius:12px; color:#fff; font-weight:800; cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif; }

/* Footer */
.footer {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; z-index: 50;
  background: var(--header-bg); backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  text-align: center; padding: 8px 16px;
  font-size: 10px; color: var(--muted); letter-spacing: 1px;
  font-family: 'Syne', sans-serif;
}

/* Empty */
.empty { text-align: center; color: var(--muted); opacity: 0.4; font-size: 13px; padding: 28px 0; }

@keyframes glow-pulse { 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.12);opacity:1} }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn 0.3s ease forwards; }


/* Floating Calc Button */
.fab {
  position: fixed; bottom: 52px; right: 16px; z-index: 60;
  width: 58px; height: 58px; border-radius: 18px; border: none; cursor: pointer;
  background: linear-gradient(145deg, #0d2137 0%, #071a2e 100%);
  box-shadow: 0 0 0 1px rgba(0,200,100,0.4), 0 8px 32px rgba(0,200,100,0.25), 0 2px 8
